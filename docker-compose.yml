services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - ./frontend/node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./storage:/app/storage
      - ./backend:/app/backend
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - ocr

  ocr:
    image: tesseractshadow/tesseract4re
    container_name: tesseract
    command: tail -f /dev/null # 常駐化（バックエンドが直接使用する場合は不要な場合も）
    volumes:
      - ./storage/images:/data/images
